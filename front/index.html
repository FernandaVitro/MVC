<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGP - Dashboard</title>

    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://unpkg.com/@mui/material@5.15.15/umd/material-ui.development.js"></script>
    <script src="https://unpkg.com/@emotion/react@11.11.3/dist/emotion-react.umd.min.js"></script>
    <script src="https://unpkg.com/@emotion/styled@11.11.0/dist/emotion-styled.umd.min.js"></script>

</head>

<body style="margin:0; background:#f5f3ff">
    <div id="root"></div>

    <script type="text/babel">
        const {
            Box, Button, TextField, Typography, Paper, Table, TableBody,
            TableCell, TableContainer, TableHead, TableRow, Dialog,
            DialogTitle, DialogContent, IconButton, Grid, Alert
        } = MaterialUI;

        const { createTheme, ThemeProvider } = MaterialUI;

        const theme = createTheme({
            palette: {
                mode: 'light',
                primary: { main: '#7c3aed' },
                secondary: { main: '#a78bfa' },
                background: {
                    default: '#f5f3ff',
                    paper: '#ffffff'
                }
            },
            shape: { borderRadius: 14 }
        });

        const API_URL = 'http://localhost:3000/pessoas';

        const SGPForm = () => {
            const [formData, setFormData] = React.useState({
                pessoa_id: '', documento: '', nome_razao_social: '',
                nome_social_fantasia: '', cep: '', endereco: '', numero: '',
                bairro: '', cidade: '', estado: '', email: ''
            });

            const [pessoas, setPessoas] = React.useState([]);
            const [open, setOpen] = React.useState(false);
            const [msg, setMsg] = React.useState('');

            const handle = (e) => {
                setFormData({ ...formData, [e.target.id]: e.target.value });
            };

            const salvar = async () => {
                const metodo = formData.pessoa_id ? 'PUT' : 'POST';
                const url = formData.pessoa_id ? `${API_URL}/${formData.pessoa_id}` : API_URL;

                try {
                    const res = await fetch(url, {
                        method: metodo,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ...formData, tipo: 'Fisica' })
                    });

                    if (res.ok) {
                        setMsg('Salvo com sucesso');
                        limpar();
                        if (open) carregar();
                    } else {
                        setMsg('Erro ao salvar');
                    }
                } catch {
                    setMsg('Erro de conexão');
                }
            };

            const carregar = async () => {
                try {
                    const res = await fetch(API_URL);
                    const data = await res.json();
                    setPessoas(data);
                } catch {
                    setMsg('Erro ao carregar');
                }
            };

            const deletar = async (id) => {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                carregar();
            };

            const limpar = () => setFormData({
                pessoa_id: '', documento: '', nome_razao_social: '',
                nome_social_fantasia: '', cep: '', endereco: '', numero: '',
                bairro: '', cidade: '', estado: '', email: ''
            });

            return (
                <Box sx={{ maxWidth: 1100, mx: 'auto', mt: 5 }}>

                    <Typography variant="h4" sx={{ mb: 3, color: '#6d28d9', fontWeight: 700 }}>
                        Cadastro de Pessoas
                    </Typography>

                    {msg && <Alert sx={{ mb: 2 }}>{msg}</Alert>}

                    <Paper sx={{ p: 4, mb: 4, border: '1px solid #ddd6fe' }}>
                        <Grid container spacing={2}>

                            {Object.keys(formData).filter(k => k !== 'pessoa_id').map((key) => (
                                <Grid item xs={12} md={6} key={key}>
                                    <TextField
                                        fullWidth
                                        id={key}
                                        label={key}
                                        value={formData[key]}
                                        onChange={handle}
                                        sx={{
                                            '& .MuiOutlinedInput-root': {
                                                borderRadius: 3
                                            }
                                        }}
                                    />
                                </Grid>
                            ))}

                            <Grid item xs={12}>
                                <Button
                                    fullWidth
                                    variant="contained"
                                    onClick={salvar}
                                    sx={{
                                        background: '#7c3aed',
                                        '&:hover': { background: '#6d28d9' }
                                    }}
                                >
                                    Salvar
                                </Button>
                            </Grid>
                        </Grid>
                    </Paper>

                    <Button
                        variant="outlined"
                        onClick={() => { setOpen(true); carregar(); }}
                        sx={{ borderColor: '#7c3aed', color: '#7c3aed' }}
                    >
                        Ver Pessoas
                    </Button>

                    <Dialog open={open} onClose={() => setOpen(false)} fullWidth maxWidth="lg">
                        <DialogTitle sx={{ color: '#6d28d9' }}>Lista de Pessoas</DialogTitle>
                        <DialogContent>
                            <Table>
                                <TableHead>
                                    <TableRow>
                                        <TableCell>ID</TableCell>
                                        <TableCell>Nome</TableCell>
                                        <TableCell>Ações</TableCell>
                                    </TableRow>
                                </TableHead>
                                <TableBody>
                                    {pessoas.map(p => (
                                        <TableRow key={p.id}>
                                            <TableCell>{p.id}</TableCell>
                                            <TableCell>{p.nome_razao_social}</TableCell>
                                            <TableCell>
                                                <IconButton onClick={() => setFormData(p)}>
                                                    <i className="material-icons">edit</i>
                                                </IconButton>
                                                <IconButton onClick={() => deletar(p.id)}>
                                                    <i className="material-icons">delete</i>
                                                </IconButton>
                                            </TableCell>
                                        </TableRow>
                                    ))}
                                </TableBody>
                            </Table>
                        </DialogContent>
                    </Dialog>
                </Box>
            );
        };

        const Produtos = () => {
            const [produtos, setProdutos] = React.useState([]);
            const [form, setForm] = React.useState({
                id: '', nome: '', descricao: '', preco: '', estoque: '', categoria: ''
            });

            const carregar = async () => {
                const res = await fetch('http://localhost:3000/produtos');
                const data = await res.json();
                setProdutos(data.map(p => ({ ...p, id: p.id_produtos })));
            };

            const salvar = async () => {
                const metodo = form.id ? 'PUT' : 'POST';
                const url = form.id
                    ? `http://localhost:3000/produtos/${form.id}`
                    : 'http://localhost:3000/produtos';

                await fetch(url, {
                    method: metodo,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(form)
                });

                carregar();
                setForm({ id: '', nome: '', descricao: '', preco: '', estoque: '', categoria: '' });
            };

            const deletar = async (id) => {
                await fetch(`http://localhost:3000/produtos/${id}`, { method: 'DELETE' });
                carregar();
            };

            React.useEffect(() => { carregar(); }, []);

            return (
                <Box sx={{ maxWidth: 1100, mx: 'auto', mt: 5 }}>
                    <Typography variant="h4" sx={{ mb: 3, color: '#6d28d9' }}>Produtos</Typography>

                    <Paper sx={{ p: 4, mb: 4 }}>
                        <Grid container spacing={2}>
                            {Object.keys(form).filter(k => k !== 'id').map(key => (
                                <Grid item xs={12} md={6} key={key}>
                                    <TextField
                                        fullWidth
                                        label={key}
                                        value={form[key]}
                                        onChange={(e) => setForm({ ...form, [key]: e.target.value })}
                                    />
                                </Grid>
                            ))}

                            <Grid item xs={12}>
                                <Button fullWidth variant="contained" onClick={salvar}>
                                    Salvar Produto
                                </Button>
                            </Grid>
                        </Grid>
                    </Paper>

                    <TableContainer component={Paper}>
                        <Table>
                            <TableHead>
                                <TableRow>
                                    <TableCell>Nome</TableCell>
                                    <TableCell>Categoria</TableCell>
                                    <TableCell>Ações</TableCell>
                                </TableRow>
                            </TableHead>
                            <TableBody>
                                {produtos.map(p => (
                                    <TableRow key={p.id}>
                                        <TableCell>{p.nome}</TableCell>
                                        <TableCell>{p.categoria}</TableCell>
                                        <TableCell>
                                            <IconButton onClick={() => setForm(p)}>
                                                <i className="material-icons">edit</i>
                                            </IconButton>
                                            <IconButton onClick={() => deletar(p.id)}>
                                                <i className="material-icons">delete</i>
                                            </IconButton>
                                        </TableCell>
                                    </TableRow>
                                ))}
                            </TableBody>
                        </Table>
                    </TableContainer>
                </Box>
            );
        };

        const App = () => {
            const [page, setPage] = React.useState('pessoas');

            return (
                <ThemeProvider theme={theme}>
                    <Box sx={{ p: 3 }}>
                        <Button variant="contained" onClick={() => setPage('pessoas')} sx={{ mr: 2 }}>
                            Pessoas
                        </Button>
                        <Button variant="contained" onClick={() => setPage('produtos')}>
                            Produtos
                        </Button>

                        {page === 'pessoas' && <SGPForm />}
                        {page === 'produtos' && <Produtos />}
                    </Box>
                </ThemeProvider>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
